<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./Navbar.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
  <nav>
    <div class="nav__logo">

      <a href="/">
        Stay <img src="/Assets/doctor-2027768_1280.png" alt="logo" class="logo_icon"> Healthy

      </a>

      <span></span>
    </div>

    <div class="nav__icon" onClick={handleClick}>

      <i class="fa fa-times fa fa-bars"></i>
    </div>


    <ul class="nav__links active">

      <li class="link">
        <a href="../Landing_Page/LandingPage.html">Home</a>
      </li>

      <li class="link">
        <a href="#">Appointments</a>
      </li>

      <li class="btn">
        <a href="../Sign_Up/Sign_Up.html">
          <button class="btn1">Sign Up</button>
        </a>
      </li>

      <li class="btn">
        <a href="../Login/Login.html">
          <button class="btn1">Login</button>
        </a>
      </li>
    </ul>


    <script>

      function handleClick() {
        const navLinks = document.querySelector(".nav__links");
        const navIcon = document.querySelector(".nav__icon i");

        // Toggle the 'active' class on the navigation links
        navLinks.classList.toggle("active");

        // Toggle the Font Awesome icons (bars and times)
        if (navLinks.classList.contains("active")) {
          navIcon.classList.remove("fa-bars");
          navIcon.classList.add("fa-times");
        } else {
          navIcon.classList.remove("fa-times");
          navIcon.classList.add("fa-bars");
        }
      }
    </script>
</body>

</html>
